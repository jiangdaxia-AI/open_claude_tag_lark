# 全局 Agent 模板 - 定义一次，所有新群自动初始化时复制此配置
#
# Bot 进任何新群后收到第一条消息时，系统自动：
#   1. 复制整个 channels/templates/ 到 data/channels/<chat_id>/
#   2. 为每个 Agent 创建 agents/<id>/AGENT.md + MEMORY.md
#   3. 启动时自动调飞书 API 获取 bot_open_id（只需 app_id + app_secret）
#
# 无需手动为每个群创建配置！零配置开箱即用。
#
# ⚠️  把下面的 feishu_app_id / feishu_app_secret 换成你自己的飞书应用凭证。
#     在 https://open.feishu.cn/app 创建自建应用后获取。

# ── 默认 Agent：兜底响应（没有 @ 特定 Bot 时由此 Agent 接话）──
[[agent]]
id = "assistant"
display_name = "万能助手"
description = "万能 AI 助手。群聊里没有 @ 其他 Bot 时，由我兜底接话。什么都能聊，什么都能帮忙。"
feishu_app_id = "cli_your_default_bot_app_id"
feishu_app_secret = "your_default_bot_app_secret"
is_default = true
idle_timeout_seconds = 600

# ── 产品专家 ──
[[agent]]
id = "product"
display_name = "产品专家"
description = "产品需求分析专家。擅长从一句话需求中提取用户故事、拆解功能点、评估优先级。你只需要说一句话，我帮你拆成完整的需求文档。"
feishu_app_id = "cli_your_product_bot_app_id"
feishu_app_secret = "your_product_bot_app_secret"
is_default = false
idle_timeout_seconds = 600

# ── 代码专家 ──
[[agent]]
id = "codebot"
display_name = "代码专家"
description = "代码专家。擅长代码审查、Bug 定位、架构设计、部署方案。不管能不能跑，先写了再说——但我会认真告诉你为什么。"
feishu_app_id = "cli_your_codebot_app_id"
feishu_app_secret = "your_codebot_app_secret"
is_default = false
idle_timeout_seconds = 600
